services:
  - type: web
    name: zukkor-backend
    runtime: docker
    plan: free
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: zukkor-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      # Cloudflare R2 — avatar saqlash. Maxfiy qiymatlar Render dashboard'da
      # qo'lda kiritiladi (sync: false — repoga yozilmaydi).
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET
        sync: false
      - key: R2_PUBLIC_BASE_URL
        sync: false

databases:
  - name: zukkor-db
    plan: free
    databaseName: zukkor_db
    user: zukkor
